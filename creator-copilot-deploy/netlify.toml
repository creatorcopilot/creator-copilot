[[redirects]]
  from = "/"
  to = "/public/index.html"
  status = 200

[[redirects]]
  from = "/demographic-builder"
  to = "/public/demographic-builder.html"
  status = 200

[[redirects]]
  from = "/intake"
  to = "/public/intake-form.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[build]
  publish = "public"
  functions = "api"

[functions]
  node_bundler = "esbuild"
